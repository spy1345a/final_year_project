<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Expense Tracker</a>
        <div class="navbar-menu">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <span class="moon">🌙</span>
                <span class="sun">☀️</span>
            </button>
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        </div>
    </nav>
    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <div class="container">
        <div class="card hero">
            <h1>Track Your Expenses</h1>
            <p>Manage your finances with ease using our intelligent expense tracking app with AI-powered categorization</p>
            <div class="hero-buttons">
                <a href="/login" class="btn btn-primary">Get Started</a>
                <a href="/signup" class="btn btn-secondary">Create Account</a>
            </div>
        </div>
        
        <div class="stats-grid" style="margin-top: 2rem;">
            <div class="stat-card">
                <div class="stat-label">Smart Categories</div>
                <div class="stat-value">8+</div>
            </div>
            <div class="stat-card secondary">
                <div class="stat-label">AI Prediction</div>
                <div class="stat-value">🤖</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-label">Voice Input</div>
                <div class="stat-value">🎤</div>
            </div>
        </div>
    </div>
</body>
</html>
