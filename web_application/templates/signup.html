<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Expense Tracker</a>
        <div class="navbar-menu">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                <span class="moon">🌙</span>
                <span class="sun">☀️</span>
            </button>
            <a href="/login">Login</a>
        </div>
    </nav>
    <script>
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
    </script>
    <div class="container">
        <div class="signup-form">
            <div class="card-header">Create Account</div>
            
            {% if error %}
                <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Choose a password (min 8 chars, letter + number)" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--gray-dark);">
                Already have an account? <a href="/login" class="link">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
